<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>เข้าสู่ระบบ • FateX Cat Paw</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="app-config.js?v=20"></script><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,"Noto Sans Thai",sans-serif;color:#fffaf0;background:radial-gradient(circle at 15% 8%,rgba(139,120,255,.28),transparent 28%),radial-gradient(circle at 88% 18%,rgba(84,216,255,.18),transparent 25%),#070b24;display:grid;place-items:center;padding:22px;overflow:hidden}body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,#fff 0 1px,transparent 1.5px),radial-gradient(circle,#ffd28f 0 1px,transparent 1.5px);background-size:52px 52px,88px 88px;opacity:.18;animation:stars 34s linear infinite}@keyframes stars{to{background-position:52px 52px,88px 88px}}.wrap{width:min(980px,100%);display:grid;grid-template-columns:1.05fr .95fr;border:1px solid rgba(184,196,255,.2);border-radius:30px;overflow:hidden;background:rgba(11,18,55,.9);backdrop-filter:blur(22px);box-shadow:0 35px 100px rgba(0,0,0,.5);position:relative}.art{padding:55px;background:linear-gradient(145deg,rgba(139,120,255,.24),rgba(84,216,255,.08));display:flex;flex-direction:column;justify-content:center;min-height:600px;position:relative}.art:after{content:"🐾  ✦  🐾";position:absolute;left:38px;bottom:30px;color:rgba(255,202,183,.18);font-size:25px;letter-spacing:13px}.art h1{font-size:clamp(42px,6vw,76px);line-height:.98;margin:0 0 20px}.art p{color:#bdc7e3;font-size:18px;max-width:470px}.planet{font-size:0}.planet:after{content:"🐱‍🚀";font-size:126px;filter:drop-shadow(0 18px 32px rgba(83,126,255,.3));display:inline-block;animation:float 4s ease-in-out infinite}@keyframes float{50%{transform:translateY(-14px) rotate(4deg)}}.form{padding:48px;display:flex;flex-direction:column;justify-content:center;background:rgba(8,14,42,.72)}.tabs{display:flex;gap:8px;margin-bottom:22px}.tabs button{flex:1}.btn,input{width:100%;border-radius:14px;padding:14px 16px;font:inherit}.btn{border:1px solid rgba(184,196,255,.2);background:#121d4c;color:#fff;cursor:pointer}.btn.active,.btn.primary{background:linear-gradient(135deg,#8b78ff,#49cfff);border:0;font-weight:800}.btn:active{transform:scale(.98)}.field{margin:12px 0}.field label{display:block;margin-bottom:7px;color:#d7def3}.field input{background:#0b1742;border:1px solid rgba(184,196,255,.22);color:#fff;outline:none}.field input:focus{border-color:#8b78ff;box-shadow:0 0 0 4px rgba(139,120,255,.14)}.msg{min-height:24px;color:#ff9fba;margin:12px 0}.back{color:#a8dfff;text-decoration:none;margin-top:18px;text-align:center}@media(max-width:760px){.wrap{grid-template-columns:1fr}.art{min-height:auto;padding:32px}.planet:after{font-size:76px}.form{padding:32px}}
</style></head><body><main class="wrap"><section class="art"><div class="planet">🌙</div><h1>กลับเข้าสู่<br>พื้นที่ของคุณ</h1><p>เข้าสู่ระบบเพื่อจ้างบริการ เติมเครดิต และติดตามสถานะงานของคุณ ✦ 🐾</p></section><section class="form"><h2 id="title">เข้าสู่ระบบ</h2><div class="tabs"><button id="loginTab" class="btn active">เข้าสู่ระบบ</button><button id="signupTab" class="btn">สมัครสมาชิก</button></div><div class="field"><label>อีเมล</label><input id="email" type="email" autocomplete="email" placeholder="you@example.com"></div><div class="field"><label>รหัสผ่าน</label><input id="password" type="password" minlength="6" autocomplete="current-password" placeholder="อย่างน้อย 6 ตัวอักษร"></div><div id="msg" class="msg"></div><button id="submit" class="btn primary">เข้าสู่ระบบ</button><a class="back" href="index.html">← กลับหน้าหลัก</a></section></main><script>
const cfg=window.APP_CONFIG||{};const sb=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);let mode='login';const $=s=>document.querySelector(s);function setMode(m){mode=m;$('#loginTab').classList.toggle('active',m==='login');$('#signupTab').classList.toggle('active',m==='signup');$('#title').textContent=m==='login'?'เข้าสู่ระบบ':'สร้างบัญชี';$('#submit').textContent=m==='login'?'เข้าสู่ระบบ':'สมัครสมาชิก';$('#password').autocomplete=m==='login'?'current-password':'new-password';$('#msg').textContent=''}$('#loginTab').onclick=()=>setMode('login');$('#signupTab').onclick=()=>setMode('signup');$('#submit').onclick=async()=>{const email=$('#email').value.trim(),password=$('#password').value;$('#msg').textContent='กำลังดำเนินการ...';if(!email||password.length<6){$('#msg').textContent='กรอกอีเมลและรหัสผ่านอย่างน้อย 6 ตัวอักษร';return}const res=mode==='login'?await sb.auth.signInWithPassword({email,password}):await sb.auth.signUp({email,password});if(res.error){$('#msg').textContent=res.error.message;return}if(mode==='signup'&&!res.data.session){$('#msg').style.color='#75e4b4';$('#msg').textContent='สมัครสำเร็จ กรุณายืนยันอีเมลก่อนเข้าสู่ระบบ';return}const next=new URLSearchParams(location.search).get('next');try{const c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=760;g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.16);o.start();o.stop(c.currentTime+.17)}catch(e){};location.href=next==='wallet'?'index.html#wallet':'index.html#home'};sb.auth.getSession().then(({data})=>{if(data.session)location.href='index.html'});
</script></body></html>
