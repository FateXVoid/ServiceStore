<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>เข้าสู่ระบบ • FateX Starry</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="app-config.js?v=17"></script><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,"Noto Sans Thai",sans-serif;color:#f8f9ff;background:radial-gradient(circle at 20% 10%,rgba(91,76,255,.3),transparent 28%),radial-gradient(circle at 85% 20%,rgba(42,201,255,.2),transparent 24%),#070b1d;display:grid;place-items:center;padding:22px;overflow:hidden}body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,#fff 0 1px,transparent 1.5px);background-size:48px 48px;opacity:.2;animation:stars 28s linear infinite}@keyframes stars{to{transform:translateY(48px)}}.wrap{width:min(980px,100%);display:grid;grid-template-columns:1.05fr .95fr;border:1px solid rgba(160,177,255,.2);border-radius:30px;overflow:hidden;background:rgba(10,16,42,.83);backdrop-filter:blur(22px);box-shadow:0 35px 100px rgba(0,0,0,.55);position:relative}.art{padding:55px;background:linear-gradient(145deg,rgba(100,81,255,.28),rgba(27,177,255,.1));display:flex;flex-direction:column;justify-content:center;min-height:600px}.art h1{font-size:clamp(42px,6vw,78px);line-height:.98;margin:0 0 20px}.art p{color:#b9c5e4;font-size:18px;max-width:470px}.planet{font-size:120px;filter:drop-shadow(0 0 30px rgba(139,123,255,.5));animation:float 4s ease-in-out infinite}@keyframes float{50%{transform:translateY(-14px) rotate(5deg)}}.form{padding:48px;display:flex;flex-direction:column;justify-content:center}.tabs{display:flex;gap:8px;margin-bottom:22px}.tabs button{flex:1}.btn,input{width:100%;border-radius:14px;padding:14px 16px;font:inherit}.btn{border:1px solid rgba(159,177,255,.22);background:#111a3c;color:#fff;cursor:pointer}.btn.active,.btn.primary{background:linear-gradient(135deg,#7567ff,#2dc0ff);border:0;font-weight:800}.field{margin:12px 0}.field label{display:block;margin-bottom:7px;color:#c4ccea}.field input{background:#0d1634;border:1px solid rgba(159,177,255,.22);color:#fff;outline:none}.field input:focus{border-color:#7d74ff;box-shadow:0 0 0 4px rgba(125,116,255,.12)}.msg{min-height:24px;color:#ff9fba;margin:12px 0}.back{color:#a8dfff;text-decoration:none;margin-top:18px;text-align:center}@media(max-width:760px){.wrap{grid-template-columns:1fr}.art{min-height:auto;padding:34px}.planet{font-size:70px}.form{padding:34px}}
</style></head><body><main class="wrap"><section class="art"><div class="planet">🪐</div><h1>กลับเข้าสู่<br>จักรวาลของคุณ</h1><p>เข้าสู่ระบบเพื่อซื้อบริการ เติมเครดิต ดูออเดอร์ และจัดการบัญชีอย่างปลอดภัย</p></section><section class="form"><h2 id="title">เข้าสู่ระบบ</h2><div class="tabs"><button id="loginTab" class="btn active">เข้าสู่ระบบ</button><button id="signupTab" class="btn">สมัครสมาชิก</button></div><div class="field"><label>อีเมล</label><input id="email" type="email" autocomplete="email" placeholder="you@example.com"></div><div class="field"><label>รหัสผ่าน</label><input id="password" type="password" minlength="6" autocomplete="current-password" placeholder="อย่างน้อย 6 ตัวอักษร"></div><div id="msg" class="msg"></div><button id="submit" class="btn primary">เข้าสู่ระบบ</button><a class="back" href="index.html">← กลับหน้าหลัก</a></section></main><script>
const cfg=window.APP_CONFIG||{};const sb=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);let mode='login';const $=s=>document.querySelector(s);function setMode(m){mode=m;$('#loginTab').classList.toggle('active',m==='login');$('#signupTab').classList.toggle('active',m==='signup');$('#title').textContent=m==='login'?'เข้าสู่ระบบ':'สร้างบัญชี';$('#submit').textContent=m==='login'?'เข้าสู่ระบบ':'สมัครสมาชิก';$('#password').autocomplete=m==='login'?'current-password':'new-password';$('#msg').textContent=''}$('#loginTab').onclick=()=>setMode('login');$('#signupTab').onclick=()=>setMode('signup');$('#submit').onclick=async()=>{const email=$('#email').value.trim(),password=$('#password').value;$('#msg').textContent='กำลังดำเนินการ...';if(!email||password.length<6){$('#msg').textContent='กรอกอีเมลและรหัสผ่านอย่างน้อย 6 ตัวอักษร';return}const res=mode==='login'?await sb.auth.signInWithPassword({email,password}):await sb.auth.signUp({email,password});if(res.error){$('#msg').textContent=res.error.message;return}if(mode==='signup'&&!res.data.session){$('#msg').style.color='#75e4b4';$('#msg').textContent='สมัครสำเร็จ กรุณายืนยันอีเมลก่อนเข้าสู่ระบบ';return}const next=new URLSearchParams(location.search).get('next');location.href=next==='wallet'?'index.html#wallet':'index.html'};sb.auth.getSession().then(({data})=>{if(data.session)location.href='index.html'});
</script></body></html>
